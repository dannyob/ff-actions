name: USDFC Liquidity

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Probe
        run: |
          uv run --script usdfc-liquidity/usdfc-liquidity-monitor.py \
            --db usdfc-liquidity/usdfc-liquidity.sqlite \
            --csv usdfc-liquidity/usdfc-liquidity.csv \
            --csv-limit 20000 \
            --once
      - uses: EndBug/add-and-commit@v9
        with:
          add: usdfc-liquidity/
          author_name: Danny
          author_email: danny@spesh.com
          message: '[automated] usdfc-liquidity probe'
